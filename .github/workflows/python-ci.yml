name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-compatibility-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies for compatibility check
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/gateway-service/requirements.txt
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
    - name: Run API breaking change check
      run: |
        python prontuarioeletronico/scripts/check_api_breaking_changes.py

  security-baseline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install security scanner
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    - name: Run Bandit (high severity/confidence)
      run: |
        bandit -r prontuarioeletronico/services/auth-service/src -lll -iii
        bandit -r prontuarioeletronico/services/patient-service/src -lll -iii
        bandit -r prontuarioeletronico/services/gateway-service/src -lll -iii
        bandit -r prontuarioeletronico/services/emr-service/src -lll -iii
        bandit -r prontuarioeletronico/services/scheduling-service/src -lll -iii
        bandit -r prontuarioeletronico/services/audit-service/src -lll -iii
        bandit -r prontuarioeletronico/services/professional-service/src -lll -iii
    - name: Build images, block CRITICAL CVEs and generate SBOM
      run: |
        bash prontuarioeletronico/scripts/generate_sbom_and_scan_images.sh
    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-cyclonedx-docker03
        path: prontuarioeletronico/board/sbom/*.cdx.json
        if-no-files-found: error

  core-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/requirements.txt
        pip install pytest
    - name: Run core tests
      run: |
        pytest -q prontuarioeletronico/src

  auth-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install auth-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run auth-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/auth-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  patient-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install patient-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run patient-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/patient-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  emr-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install emr-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run emr-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/emr-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  scheduling-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install scheduling-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run scheduling-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/scheduling-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  audit-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install audit-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run audit-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/audit-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  professional-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install professional-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run professional-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/professional-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  gateway-integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install gateway/auth/patient dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/gateway-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
        pip install pytest
    - name: Run gateway integration tests
      working-directory: prontuarioeletronico/services/gateway-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  cicd-publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - core-tests
      - auth-service-tests
      - patient-service-tests
      - emr-service-tests
      - scheduling-service-tests
      - audit-service-tests
      - professional-service-tests
      - gateway-integration-tests
      - api-compatibility-check
      - security-baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - patient-service
          - emr-service
          - scheduling-service
          - audit-service
          - professional-service
          - gateway-service
    steps:
    - uses: actions/checkout@v4
    - name: Download SBOM artifacts from security-baseline
      uses: actions/download-artifact@v4
      with:
        name: sbom-cyclonedx-docker03
        path: prontuarioeletronico/board/sbom
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image namespace
      id: meta
      run: |
        echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
    - name: Build and push ${{ matrix.service }}
      id: buildpush
      uses: docker/build-push-action@v6
      with:
        context: ./prontuarioeletronico/services/${{ matrix.service }}
        file: ./prontuarioeletronico/services/${{ matrix.service }}/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}:${{ github.sha }}
          ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}:main
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.run_id }}
    - name: Emit artifact trace metadata
      run: |
        mkdir -p artifact-trace
        cat > artifact-trace/${{ matrix.service }}.json <<EOF
        {
          "service": "${{ matrix.service }}",
          "repository": "ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}",
          "tags": [
            "${{ github.sha }}",
            "main"
          ],
          "digest": "${{ steps.buildpush.outputs.digest }}",
          "sbom_file": "prontuarioeletronico/board/sbom/${{ matrix.service }}.cdx.json",
          "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }
        EOF
    - name: Upload artifact trace metadata
      uses: actions/upload-artifact@v4
      with:
        name: artifact-trace-${{ matrix.service }}
        path: artifact-trace/${{ matrix.service }}.json
        if-no-files-found: error
