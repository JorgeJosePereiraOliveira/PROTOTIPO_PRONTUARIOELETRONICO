name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest sqlalchemy
    - name: Run tests
      run: |
        pytest prontuarioeletronico/src/infra/professional/sqlalchemy/
        pytest prontuarioeletronico/src/infra/appointment/sqlalchemy/
        pytest prontuarioeletronico/src/infra/clinical_record/sqlalchemy/
        pytest prontuarioeletronico/src/infra/patient/sqlalchemy/
