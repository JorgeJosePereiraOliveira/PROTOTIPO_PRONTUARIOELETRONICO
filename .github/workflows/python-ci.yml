name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/requirements.txt
        pip install pytest
    - name: Run core tests
      run: |
        pytest -q prontuarioeletronico/src

  auth-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install auth-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run auth-service tests (inclui OpenAPI contrato)
      run: |
        pytest -q prontuarioeletronico/services/auth-service/tests
