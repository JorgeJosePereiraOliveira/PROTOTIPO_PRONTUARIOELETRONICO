name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      simulate_slo_breach:
        description: Simular violacao de SLO para acionar rollback automatico
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  api-compatibility-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies for compatibility check
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/gateway-service/requirements.txt
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
    - name: Run API breaking change check
      run: |
        python prontuarioeletronico/scripts/check_api_breaking_changes.py

  security-baseline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install security scanner
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    - name: Run Bandit (high severity/confidence)
      run: |
        bandit -r prontuarioeletronico/services/auth-service/src -lll -iii
        bandit -r prontuarioeletronico/services/patient-service/src -lll -iii
        bandit -r prontuarioeletronico/services/gateway-service/src -lll -iii
        bandit -r prontuarioeletronico/services/emr-service/src -lll -iii
        bandit -r prontuarioeletronico/services/scheduling-service/src -lll -iii
        bandit -r prontuarioeletronico/services/audit-service/src -lll -iii
        bandit -r prontuarioeletronico/services/professional-service/src -lll -iii
    - name: Build images, block CRITICAL CVEs and generate SBOM
      run: |
        bash prontuarioeletronico/scripts/generate_sbom_and_scan_images.sh
    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-cyclonedx-docker03
        path: prontuarioeletronico/board/sbom/*.cdx.json
        if-no-files-found: error

  core-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/requirements.txt
        pip install pytest
    - name: Run core tests
      run: |
        pytest -q prontuarioeletronico/src

  auth-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install auth-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run auth-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/auth-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  patient-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install patient-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run patient-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/patient-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  emr-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install emr-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run emr-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/emr-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  scheduling-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install scheduling-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run scheduling-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/scheduling-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  audit-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install audit-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run audit-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/audit-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  professional-service-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install professional-service dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install pytest
    - name: Run professional-service tests (inclui OpenAPI contrato)
      working-directory: prontuarioeletronico/services/professional-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  gateway-integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install gateway/auth/patient dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r prontuarioeletronico/services/gateway-service/requirements.txt
        pip install -r prontuarioeletronico/services/auth-service/requirements.txt
        pip install -r prontuarioeletronico/services/patient-service/requirements.txt
        pip install -r prontuarioeletronico/services/emr-service/requirements.txt
        pip install -r prontuarioeletronico/services/scheduling-service/requirements.txt
        pip install -r prontuarioeletronico/services/audit-service/requirements.txt
        pip install -r prontuarioeletronico/services/professional-service/requirements.txt
        pip install pytest
    - name: Run gateway integration tests
      working-directory: prontuarioeletronico/services/gateway-service
      env:
        PYTHONPATH: .
      run: |
        python -m pytest -q tests

  cicd-publish-images:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    needs:
      - core-tests
      - auth-service-tests
      - patient-service-tests
      - emr-service-tests
      - scheduling-service-tests
      - audit-service-tests
      - professional-service-tests
      - gateway-integration-tests
      - api-compatibility-check
      - security-baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - patient-service
          - emr-service
          - scheduling-service
          - audit-service
          - professional-service
          - gateway-service
    steps:
    - uses: actions/checkout@v4
    - name: Download SBOM artifacts from security-baseline
      uses: actions/download-artifact@v4
      with:
        name: sbom-cyclonedx-docker03
        path: prontuarioeletronico/board/sbom
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Resolve image namespace
      id: meta
      run: |
        echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
    - name: Build and push ${{ matrix.service }}
      id: buildpush
      uses: docker/build-push-action@v6
      with:
        context: ./prontuarioeletronico/services/${{ matrix.service }}
        file: ./prontuarioeletronico/services/${{ matrix.service }}/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}:${{ github.sha }}
          ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}:main
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.run_id }}
    - name: Emit artifact trace metadata
      run: |
        mkdir -p artifact-trace
        cat > artifact-trace/${{ matrix.service }}.json <<EOF
        {
          "service": "${{ matrix.service }}",
          "repository": "ghcr.io/${{ steps.meta.outputs.owner_lc }}/prontuario-${{ matrix.service }}",
          "tags": [
            "${{ github.sha }}",
            "main"
          ],
          "digest": "${{ steps.buildpush.outputs.digest }}",
          "sbom_file": "prontuarioeletronico/board/sbom/${{ matrix.service }}.cdx.json",
          "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }
        EOF
    - name: Upload artifact trace metadata
      uses: actions/upload-artifact@v4
      with:
        name: artifact-trace-${{ matrix.service }}
        path: artifact-trace/${{ matrix.service }}.json
        if-no-files-found: error

  cicd-progressive-cd:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    needs:
      - cicd-publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Download artifact traces
      uses: actions/download-artifact@v4
      with:
        pattern: artifact-trace-*
        path: artifact-trace
        merge-multiple: true
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Progressive promotion with automatic rollback
      env:
        TRACE_DIR: artifact-trace
        SIMULATE_SLO_BREACH: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_slo_breach || 'false' }}
      run: |
        bash prontuarioeletronico/scripts/progressive_cd_with_rollback.sh
    - name: Upload progressive rollout report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: progressive-rollout-report
        path: rollout-report/progressive-rollout-summary.md
        if-no-files-found: error

  k8s-deploy-homolog:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    needs:
      - cicd-progressive-cd
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Check cluster deploy prerequisites
      id: prereq
      env:
        KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      run: |
        if [ -z "$KUBE_CONFIG_DATA" ]; then
          echo "mode=kind" >> "$GITHUB_OUTPUT"
          echo "KUBE_CONFIG_DATA is not configured. Falling back to ephemeral kind cluster."
        else
          echo "mode=external" >> "$GITHUB_OUTPUT"
        fi
    - name: Resolve homolog auth secret
      id: authsecret
      env:
        AUTH_JWT_SECRET_HOMOLOG: ${{ secrets.AUTH_JWT_SECRET_HOMOLOG }}
      run: |
        if [ -z "$AUTH_JWT_SECRET_HOMOLOG" ]; then
          echo "value=change-me-dev-secret" >> "$GITHUB_OUTPUT"
        else
          echo "value=$AUTH_JWT_SECRET_HOMOLOG" >> "$GITHUB_OUTPUT"
        fi
    - name: Download artifact traces
      uses: actions/download-artifact@v4
      with:
        pattern: artifact-trace-*
        path: artifact-trace
        merge-multiple: true
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.30.0
    - name: Set up kind cluster
      if: steps.prereq.outputs.mode == 'kind'
      uses: helm/kind-action@v1.10.0
      with:
        cluster_name: prontuario-homolog
    - name: Prepare kubeconfig
      if: steps.prereq.outputs.mode == 'external'
      run: |
        mkdir -p "$RUNNER_TEMP/.kube"
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$RUNNER_TEMP/.kube/config"
    - name: Render manifests from promoted digests
      env:
        TRACE_DIR: artifact-trace
        OUTPUT_DIR: k8s-rendered
        NAMESPACE: prontuario-homolog
        AUTH_JWT_SECRET: ${{ steps.authsecret.outputs.value }}
      run: |
        bash prontuarioeletronico/scripts/render_k8s_manifests_from_trace.sh
    - name: Deploy to homolog cluster
      if: steps.prereq.outputs.mode == 'external'
      env:
        KUBE_CONFIG: ${{ runner.temp }}/.kube/config
        MANIFEST_DIR: k8s-rendered
        NAMESPACE: prontuario-homolog
      run: |
        bash prontuarioeletronico/scripts/deploy_k8s_homolog.sh
    - name: Deploy to homolog kind cluster
      if: steps.prereq.outputs.mode == 'kind'
      env:
        KUBE_CONFIG: /home/runner/.kube/config
        MANIFEST_DIR: k8s-rendered
        NAMESPACE: prontuario-homolog
      run: |
        bash prontuarioeletronico/scripts/deploy_k8s_homolog.sh
    - name: Upload Kubernetes manifests and deploy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: k8s-homolog-deploy-artifacts
        path: |
          k8s-rendered/*.yaml
          rollout-report/k8s-homolog-deploy-report.md
        if-no-files-found: error
